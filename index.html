<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Денис Волошин | Project Manager & PR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#0a0804",
                        foreground: "#f5f5f5",
                        primary: "#f59e0b",
                        border: "rgba(255,255,255,0.1)",
                        card: "rgba(255,255,255,0.03)",
                    },
                    animation: {
                        marquee: 'marquee 40s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0804; color: #f5f5f5; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0804; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; }
        .text-outline { -webkit-text-stroke: 1px #f5f5f5; color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;
        const { motion } = FramerMotion;

        // --- ДАННЫЕ (Восстановлены ПОЛНОСТЬЮ все пункты) ---

        const NAME_CHARS_1 = 'ДЕНИС'.split('');
        const NAME_CHARS_2 = 'ВОЛОШИН'.split('');

        const NAV_ITEMS = [
            { label: 'Навыки', href: '#skills' },
            { label: 'Опыт', href: '#experience' },
            { label: 'База', href: '#education' },
            { label: 'Контакт', href: '#contact' },
        ];

        const CONTACTS_NAV = [

            { label: 'VK', href: 'https://vk.com/disvolo', title: 'VKontakte' },
            { label: '✉', href: 'mailto:disvolo@bk.ru', title: 'Email' },
        ];

        const ARTISTS = ['БАСТА', 'ЗВЕРИ', 'MACAN', 'ЕГОР КРИД', 'ПОЛИНА ГАГАРИНА', 'SALUKI', 'BASHARTH'];

        const SKILLS_CATEGORIES = [
            {
                name: "Прожект менеджмент",
                items: [
                    { title: 'Планирование', desc: 'Разбивка проекта на этапы, управление ресурсами и жесткий контроль дедлайнов (WBS).' },

                ]
            },
            {
                name: "PR & PR-Менеджмент",
                items: [
                    { title: 'PR-Стратегия', desc: 'Построение имиджа артистов/брендов и работа над репутацией.' },
                    { title: 'Media Relations', desc: 'Связи со СМИ, подготовка пресс-материалов, организация интервью.' },
                    { title: 'Event-PR', desc: 'PR-сопровождение концертов, релизов и крупных медийных событий.' },
                    { title: 'Инструменты PR', desc: 'Мониторинг, аналитика эффективности и работа с инфлюенсерами.' }
                ]
            },
            {
                name: "Тех. Продакшн & Логистика",
                items: [
                    { title: 'Technical Rider', desc: 'Понимание специфики звукового, светового и видеооборудования площадок.' },
                    { title: 'Логистика туров', desc: 'Организация сложных маршрутов, чартеров и проживания для команд 50+ человек.' },

                    { title: 'Crisis Logist', desc: 'Решение логистических форс-мажоров: отмены, задержки.' }
                ]
            }
        ];

        const TOOLS = ['Bitrix24', 'Trello', 'Jira', 'Notion', 'Asana', 'ClickUp', 'MS Project', 'Slack', 'ChatGPT / Gemini', 'Figma', 'Scrum / Kanban', 'WBS / Декомпозиция', 'OKR / KPI', 'RACI-матрица', 'P&L Management'];

        const EXPERIENCE = [
            {
                period: '2024 — 2025', company: 'SOLDOUT',
                items: [
                    'Полное управление гастрольными турами артистов первого эшелона в 36+ городах России.',
                    'Координация работы команды сопровождения (30+ человек) и локальных организаторов.',
                    'Управление бюджетом проекта, согласование смет и финальные взаиморасчеты.',
                    'Контроль технического и бытового райдера на всех площадках тура.',
                ],
            },

                period: '2024', company: 'MTS LIVE',

                            <div className="flex flex-wrap">
                                {NAME_CHARS_1.map((c, i) => <motion.span key={i} initial={{y:50, opacity:0}} animate={{y:0, opacity:1}} transition={{delay: i*0.1}} className="inline-block">{c}</motion.span>)}

                            <div className="flex flex-wrap text-transparent" style={{ WebkitTextStroke: '1px #f5f5f5' }}>

                        <div className="flex gap-12 border-t border-border pt-10">
                            <div><div className="text-4xl font-bold italic">100+</div><div className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Концертов</div></div>
                            <div><div className="text-4xl font-bold italic">36+</div><div className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Городов России</div></div>
                        </div>
                    </div>
                </section>
            );
        }

        function Marquee() {
            return (
                <div className="py-12 border-y border-border overflow-hidden bg-card">
                    <div className="flex animate-marquee whitespace-nowrap">
                        {[...ARTISTS, ...ARTISTS].map((a, i) => <span key={i} className="text-4xl md:text-6xl font-black mx-12 opacity-20 hover:opacity-100 transition-opacity cursor-default">{a}</span>)}
                    </div>
                </div>
            );
        }

        function Skills() {
            return (
                <section id="skills" className="py-24 md:py-32 px-6 md:px-20 bg-[#0d0b07]">
                    <div className="mb-16 flex items-center gap-4"><span className="font-mono text-primary text-xs tracking-widest">// 01 //</span><h2 className="text-4xl md:text-6xl font-black uppercase tracking-tight">Навыки</h2></div>
                    <div className="space-y-16">
                        {SKILLS_CATEGORIES.map(cat => (
                            <div key={cat.name}>
                                <h3 className="font-mono text-[11px] text-gray-500 uppercase tracking-[0.4em] mb-10">{cat.name}</h3>
                                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-px bg-border border border-border">
                                    {cat.items.map(s => (
                                        <div key={s.title} className="bg-background p-8 md:p-10 hover:bg-card transition-colors">
                                            <h3 className="text-xl font-bold mb-4 uppercase text-primary tracking-wider">{s.title}</h3>
                                            <p className="text-sm text-gray-400 leading-relaxed font-mono">{s.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-20">
                        <h4 className="font-mono text-[10px] text-gray-600 uppercase tracking-[0.4em] mb-10">Стек Технологий / Инструменты</h4>
                        <div className="flex flex-wrap gap-3">
                            {TOOLS.map(t => <span key={t} className="px-3 py-1.5 border border-border font-mono text-[10px] uppercase text-gray-500 hover:border-primary hover:text-primary transition-colors">{t}</span>)}
                        </div>
                    </div>
                </section>
            );
        }

        function Experience() {
            return (
                <section id="experience" className="py-24 md:py-32 px-6 md:px-20 bg-background">
                    <div className="mb-16 flex items-center gap-4"><span className="font-mono text-primary text-xs tracking-widest">// 02 //</span><h2 className="text-4xl md:text-6xl font-black uppercase tracking-tight">Опыт работы</h2></div>

                        <div key={exp.company} className="border-t border-border py-12 md:py-16 grid md:grid-cols-4 gap-4">

                            <div className="md:col-span-3">
                                <h3 className="text-3xl md:text-5xl font-black mb-8 uppercase hover:text-primary transition-colors">{exp.company}</h3>
                                <ul className="space-y-4 text-gray-400 text-sm md:text-base leading-relaxed font-mono">
                                    {exp.items.map(item => <li key={item} className="flex gap-4 items-start"><span className="text-primary mt-1">/</span> {item}</li>)}
                                </ul>
                            </div>
                        </div>
                    ))}
                </section>
            );
        }

        function Education() {
            return (
                <section id="education" className="py-24 md:py-32 px-6 md:px-20 bg-card/30">

                    <div className="space-y-12">
                        {EDUCATION.map(edu => (
                            <div key={edu.title} className="flex flex-col md:flex-row gap-6 md:items-center justify-between border-b border-border pb-10">
                                <div><h3 className="text-3xl font-bold uppercase">{edu.title}</h3><p className="text-gray-500 font-mono text-sm mt-1">{edu.subtitle}</p></div>
                                <div className="flex gap-4 items-center">
                                    <span className="font-mono text-gray-700 text-sm">{edu.period}</span>
                                    {edu.badge && <span className="px-4 py-2 bg-primary text-black font-mono text-[10px] font-bold uppercase tracking-widest">{edu.badge}</span>}
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        function Footer() {
            return (
                <footer id="contact" className="py-24 md:py-32 px-6 md:px-20 border-t border-border text-center bg-background">
                    <h2 className="text-6xl md:text-[10rem] font-black uppercase mb-16 leading-none relative">Давайте <br> <span className="text-primary italic">шуметь</span></h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto font-mono text-xs uppercase tracking-widest text-gray-300">

                    <p className="mt-20 text-[10px] text-muted-foreground tracking-widest uppercase opacity-40">© 2026 DENIS VOLOSHIN</p>

        }

        function App() {
            return (
                <div>
                    <Nav />
                    <Hero />
                    <Marquee />
                    <Skills />
                    <Experience />
                    <Education />
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
