<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Денис Волошин | Project Manager & PR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#0a0804",
                        foreground: "#f5f5f5",
                        primary: "#f59e0b",
                        border: "rgba(255,255,255,0.1)",
                        card: "rgba(255,255,255,0.03)",
                    },
                    animation: {
                        marquee: 'marquee 40s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0804; color: #f5f5f5; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .font-mono { font-family: monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0804; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;
        const { motion } = FramerMotion;

        // --- ДАННЫЕ (Восстановлены полностью) ---
        const PHOTO_URL = 'https://media.base44.com/images/public/69d3f72b14a1404fda01934e/4358e7988_Airbrush-IMAGE-ENHANCER-1775521875923-1775521875923.png';
        const NAME_CHARS_1 = 'ДЕНИС'.split('');
        const NAME_CHARS_2 = 'ВОЛОШИН'.split('');

        const ARTISTS = ['БАСТА', 'ЗВЕРИ', 'MACAN', 'ЕГОР КРИД', 'ПОЛИНА ГАГАРИНА', 'SALUKI', 'BASHARTH'];

        const SKILLS = [
            { title: 'Планирование', desc: 'Разбивка проекта на этапы, управление ресурсами и жесткий контроль дедлайнов.' },
            { title: 'Коммуникация', desc: 'Синхронизация команды, подрядчиков и заказчика. 80% работы — общение.' },
            { title: 'Crisis Management', desc: 'Мгновенная реакция на форс-мажоры: отмены рейсов, технические сбои.' },
            { title: 'Логистика туров', desc: 'Организация сложных маршрутов, перелетов и проживания для команд 50+ человек.' },
            { title: 'Тех. Продакшн', desc: 'Понимание специфики звукового, светового и видеооборудования площадок.' },
            { title: 'Управление бюджетом', desc: 'Контроль P&L, оптимизация расходов и предотвращение кассовых разрывов.' },
        ];

        const TOOLS = ['Bitrix24', 'Trello', 'Jira', 'Notion', 'Asana', 'MS Project', 'Slack', 'ChatGPT / Gemini', 'Figma', 'Scrum / Kanban'];

        const EXPERIENCE = [
            {
                period: '2024 — 2025', company: 'SOLDOUT',
                items: [
                    'Полное управление гастрольными турами артистов первого эшелона в 36+ городах.',
                    'Координация работы команды сопровождения (30+ человек) и локальных организаторов.',
                    'Управление бюджетом проекта, согласование смет и финальные взаиморасчеты.',
                    'Контроль технического и бытового райдера на всех площадках.',
                ],
            },
            {
                period: '2024', company: 'MTS LIVE',
                items: [
                    'Координация масштабных концертных мероприятий в рамках экосистемы МТС.',
                    'Взаимодействие с техническими подрядчиками и контроль застройки сцены.',
                    'Операционное управление event-командой и контроль дедлайнов.',
                ],
            },
        ];

        const EDUCATION = [
            { period: '2017 — 2021', title: 'РЭУ Плеханова', subtitle: 'Гостиничное дело / Высшее' },
            { period: '2021 — 2022', title: 'Военная служба', badge: 'Медаль за парад 2022' },
        ];

        // --- КОМПОНЕНТЫ (Переписаны для стабильности) ---

        function Nav() {
            return (
                <nav className="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-background/50 backdrop-blur-md border-b border-border">
                    <div className="font-mono text-[10px] tracking-[0.3em] uppercase font-black">Денис Волошин</div>
                    <div className="hidden md:flex gap-10 font-mono text-[10px] uppercase tracking-widest text-gray-400">

                        <a href="#experience" class="hover:text-primary transition-colors">Опыт</a>
                        <a href="#education" class="hover:text-primary transition-colors">База</a>
                        <a href="https://t.me/disvolo" class="font-bold text-primary transition-colors">TG</a>
                    </div>
                </nav>
            );
        }

        function Hero() {
            return (
                <section className="relative min-h-screen flex flex-col justify-end pb-24 px-6 md:px-20 overflow-hidden">
                    <div className="absolute inset-0 z-0">
                        <img src={PHOTO_URL} className="absolute left-0 top-0 h-full w-full md:w-1/2 object-cover object-left opacity-60 md:left-20" style={{maskImage: 'linear-gradient(to right, black 25%, transparent 100%)', WebkitMaskImage: 'linear-gradient(to right, black 25%, transparent 100%)'}} alt="Denis Voloshin" />
                        <div className="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent" />
                    </div>
                    
                    <div className="relative z-10 fade-in text-left">
                        <motion.p initial={{opacity:0}} animate={{opacity:1}} className="font-mono text-primary text-xs tracking-widest uppercase mb-4">Tour & PR Management</motion.p>
                        <h1 className="font-display text-6xl md:text-[10rem] font-black uppercase leading-[0.85] mb-12">
                            <div className="flex flex-wrap">
                                {NAME_CHARS_1.map((c, i) => <motion.span key={i} initial={{y:50, opacity:0}} animate={{y:0, opacity:1}} transition={{delay: i*0.08}} className="inline-block">{c}</motion.span>)}
                            </div>
                            <div className="flex flex-wrap text-transparent" style={{ WebkitTextStroke: '1px #f5f5f5' }}>
                                {NAME_CHARS_2.map((c, i) => <motion.span key={i} initial={{y:50, opacity:0}} animate={{y:0, opacity:1}} transition={{delay: 0.4 + i*0.08}} className="inline-block">{c}</motion.span>)}
                            </div>
                        </h1>
                        <div className="flex gap-12 border-t border-border pt-10">
                            <div><div className="text-4xl font-bold italic">100+</div><div className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Концертов</div></div>
                            <div><div className="text-4xl font-bold italic">36+</div><div className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Городов России</div></div>
                        </div>
                    </div>
                </section>
            );
        }

        function Marquee() {
            return (
                <div className="py-12 border-y border-border overflow-hidden bg-card">
                    <div className="flex animate-marquee whitespace-nowrap">
                        {[...ARTISTS, ...ARTISTS].map((a, i) => <span key={i} className="text-4xl md:text-6xl font-black mx-12 opacity-20 hover:opacity-100 transition-opacity cursor-default">{a}</span>)}
                    </div>
                </div>
            );
        }

        function Skills() {
            return (
                <section id="skills" className="py-24 md:py-32 px-6 md:px-20 bg-[#0d0b07]">
                    <div className="mb-16 flex items-center gap-4"><span className="font-mono text-primary text-xs">// 01 //</span><h2 className="text-4xl md:text-6xl font-black uppercase tracking-tight">Навыки</h2></div>
                    <div className="grid md:grid-cols-3 gap-px bg-border border border-border">
                        {SKILLS.map(s => (
                            <div key={s.title} className="bg-background p-8 md:p-10 hover:bg-card transition-colors">
                                <h3 className="text-xl font-bold mb-4 uppercase text-primary tracking-wider">{s.title}</h3>
                                <p className="text-sm text-gray-400 leading-relaxed font-mono">{s.desc}</p>
                            </div>
                        ))}
                    </div>
                    <div className="mt-16 flex flex-wrap gap-3">
                        {TOOLS.map(t => <span key={t} className="px-3 py-1.5 border border-border font-mono text-[10px] uppercase text-gray-500 hover:border-primary transition-colors">{t}</span>)}
                    </div>
                </section>
            );
        }

        function Experience() {
            return (
                <section id="experience" className="py-24 md:py-32 px-6 md:px-20 bg-background">
                    <div className="mb-16 flex items-center gap-4"><span className="font-mono text-primary text-xs">// 02 //</span><h2 className="text-4xl md:text-6xl font-black uppercase tracking-tight">Опыт работы</h2></div>
                    {EXPERIENCE.map((exp, i) => (
                        <div key={exp.company} className="border-t border-border py-12 md:py-16 grid md:grid-cols-4 gap-4">
                            <div className="font-mono text-gray-500 text-sm">{exp.period}</div>
                            <div className="md:col-span-3">
                                <h3 className="text-3xl md:text-5xl font-black mb-8 uppercase hover:text-primary transition-colors">{exp.company}</h3>
                                <ul className="space-y-4 text-gray-400 text-sm md:text-base leading-relaxed font-mono">
                                    {exp.items.map(item => <li key={item} className="flex gap-4 items-start"><span className="text-primary mt-1">/</span> {item}</li>)}
                                </ul>
                            </div>
                        </div>
                    ))}
                </section>
            );
        }

        function Footer() {
            return (
                <footer id="contact" className="py-24 md:py-32 px-6 md:px-20 border-t border-border text-center bg-background">
                    <h2 className="text-5xl md:text-9xl font-black uppercase mb-16 leading-none">Давайте <span className="text-primary italic">шуметь</span></h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto font-mono text-xs uppercase tracking-widest text-gray-300">
                        <a href="https://t.me/disvolo" className="bg-white/5 p-8 border border-white/10 hover:border-primary hover:text-primary transition-colors">Telegram</a>
                        <a href="https://vk.com/disvolo" className="bg-white/5 p-8 border border-white/10 hover:border-primary hover:text-primary transition-colors">VKontakte</a>
                        <a href="mailto:disvolo@bk.ru" className="bg-white/5 p-8 border border-white/10 hover:border-primary hover:text-primary transition-colors col-span-2 md:col-span-1">Email</a>
                    </div>
                    <p className="mt-20 text-[10px] text-muted-foreground tracking-widest uppercase opacity-40">© 2026 DENIS VOLOSHIN</p>
                </footer>
            );
        }

        function App() {
            return (
                <div>
                    <Nav />
                    <Hero />
                    <Marquee />
                    <Skills />
                    <Experience />
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
